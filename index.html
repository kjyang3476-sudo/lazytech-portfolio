<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>懶人科技 · Lazy Tech</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #111;
    --white: #fafaf8;
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --gray: #6b7280;
    --border: #e5e5e3;
    --card-bg: #fff;
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--white);
    color: var(--black);
    line-height: 1.6;
  }

  a { color: inherit; text-decoration: none; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(250,250,248,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
  }
  .nav-logo span { color: var(--accent); }
  .nav-right { display: flex; gap: 8px; align-items: center; }
  .lang-btn {
    padding: 5px 12px;
    font-size: 12px; font-weight: 600;
    border: 1.5px solid var(--border);
    background: white; cursor: pointer;
    border-radius: 6px; color: var(--gray);
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
  .nav-cta {
    padding: 7px 16px;
    background: var(--black); color: white;
    font-size: 13px; font-weight: 600;
    border: none; cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .nav-cta:hover { background: var(--accent); }

  /* CONTAINER */
  .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

  /* HERO */
  .hero {
    padding: 80px 0 72px;
    border-bottom: 1px solid var(--border);
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600;
    color: var(--accent);
    background: #eff6ff;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: 0.3px;
  }
  .hero-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .hero h1 {
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -1.5px;
    margin-bottom: 16px;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--accent);
  }
  .hero p {
    font-size: 17px;
    color: var(--gray);
    max-width: 520px;
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-primary {
    padding: 12px 24px;
    background: var(--black); color: white;
    font-size: 14px; font-weight: 600;
    border: 2px solid var(--black);
    border-radius: 8px; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn-secondary {
    padding: 12px 24px;
    background: transparent; color: var(--black);
    font-size: 14px; font-weight: 600;
    border: 2px solid var(--border);
    border-radius: 8px; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--black); }

  /* STATS */
  .stats {
    display: flex; gap: 40px;
    padding: 32px 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat-item { }
  .stat-num {
    font-size: 28px; font-weight: 800;
    letter-spacing: -1px; color: var(--black);
  }
  .stat-num span { color: var(--accent); }
  .stat-label { font-size: 13px; color: var(--gray); margin-top: 2px; }

  /* SECTION */
  section { padding: 64px 0; border-bottom: 1px solid var(--border); }
  .section-label {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent); margin-bottom: 8px;
  }
  .section-title {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.5px; margin-bottom: 8px;
  }
  .section-sub {
    font-size: 15px; color: var(--gray);
    margin-bottom: 40px; max-width: 480px;
  }

  /* SERVICES */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .service-card {
    padding: 24px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--card-bg);
    transition: border-color 0.15s, transform 0.15s;
  }
  .service-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .service-icon {
    font-size: 24px; margin-bottom: 12px;
  }
  .service-title {
    font-size: 15px; font-weight: 700; margin-bottom: 6px;
  }
  .service-desc {
    font-size: 13px; color: var(--gray); line-height: 1.6;
  }
  .service-price {
    margin-top: 14px;
    font-size: 13px; font-weight: 700;
    color: var(--accent);
  }

  /* WORKS */
  .works-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .work-card {
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: white;
    transition: border-color 0.15s, transform 0.15s;
    cursor: pointer;
  }
  .work-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .work-thumb {
    height: 160px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    position: relative;
    overflow: hidden;
  }
  .work-thumb-1 { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
  .work-thumb-2 { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
  .work-thumb-3 { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }
  .work-body { padding: 16px; }
  .work-tags { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .work-tag {
    font-size: 11px; font-weight: 600;
    padding: 2px 8px;
    background: #f3f4f6;
    border-radius: 4px;
    color: var(--gray);
  }
  .work-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .work-desc { font-size: 13px; color: var(--gray); line-height: 1.5; }

  /* STACK */
  .stack-grid {
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .stack-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px; font-weight: 600;
    background: white;
    transition: border-color 0.15s;
  }
  .stack-item:hover { border-color: var(--accent); }
  .stack-icon { font-size: 16px; }

  /* PROCESS */
  .process-list {
    display: flex; flex-direction: column; gap: 0;
  }
  .process-item {
    display: flex; gap: 20px;
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
  }
  .process-item:last-child { border-bottom: none; }
  .process-num {
    font-size: 32px; font-weight: 800;
    color: #e5e5e3; letter-spacing: -1px;
    min-width: 44px; line-height: 1;
    padding-top: 2px;
  }
  .process-content { flex: 1; }
  .process-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .process-desc { font-size: 13px; color: var(--gray); line-height: 1.6; }

  /* CTA */
  .cta-section {
    padding: 64px 0;
    text-align: center;
  }
  .cta-section h2 {
    font-size: 32px; font-weight: 800;
    letter-spacing: -0.8px; margin-bottom: 12px;
  }
  .cta-section p {
    font-size: 16px; color: var(--gray);
    margin-bottom: 28px;
  }
  .cta-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .fiverr-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 13px 24px;
    background: #1dbf73; color: white;
    font-size: 14px; font-weight: 700;
    border: none; border-radius: 8px; cursor: pointer;
    transition: background 0.15s;
  }
  .fiverr-btn:hover { background: #19a463; }

  /* FOOTER */
  footer {
    padding: 24px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .footer-logo { font-size: 14px; font-weight: 700; }
  .footer-logo span { color: var(--accent); }
  .footer-copy { font-size: 12px; color: var(--gray); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--black); color: white;
    padding: 12px 20px; border-radius: 8px;
    font-size: 14px; z-index: 100;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  @media (max-width: 600px) {
    .stats { gap: 24px; }
    .hero { padding: 48px 0 40px; }
    section { padding: 48px 0; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

function App() {
  const [lang, setLang] = useState("zh");
  const [toast, setToast] = useState(null);
  const t = CONTENT[lang];

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  };

  const handleFiverr = () => showToast(lang === "zh" ? "Fiverr 連結（上線後填入）" : "Fiverr link coming soon!");

  return (
    <>
      {/* NAV */}

        <div className="nav-logo">懶人科技 <span>·</span> Lazy Tech</div>
        <div className="nav-right">

            </button>
          </div>
        </div>

        {/* STATS */}

          {t.stats.map((s, i) => (

              <div className="stat-label">{s.label}</div>

          ))}
        </div>

        {/* SERVICES */}
        <section id="services">
          <div className="section-label">{t.servicesLabel}</div>
          <div className="section-title">{t.servicesTitle}</div>
          <div className="section-sub">{t.servicesSub}</div>
          <div className="services-grid">
            {t.services.map((s, i) => (
              <div key={i} className="service-card">

          <div className="works-grid">
            {t.works.map((w, i) => (
              <div key={i} className="work-card" onClick={() => w.url ? window.open(w.url, '_blank') : handleWork(w.title)}>
                <div className={`work-thumb ${w.thumb}`}>{w.icon}</div>
                <div className="work-body">
                  <div className="work-tags">
                    {w.tags.map(tag => <span key={tag} className="work-tag">{tag}</span>)}
                    {w.url && <span className="work-tag" style={{color:'#2563eb', background:'#eff6ff'}}>↗ Live</span>}
                  </div>
                  <div className="work-title">{w.title}</div>
                  <div className="work-desc">{w.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </section>

        {/* STACK */}
        <section>
          <div className="section-label">{t.stackLabel}</div>
          <div className="section-title">{t.stackTitle}</div>
          <div className="stack-grid">
            {t.stack.map((s, i) => (
              <div key={i} className="stack-item">
                <span>{s}</span>
              </div>

          </div>

        {/* PROCESS */}

          <div className="section-title">{t.processTitle}</div>
          <div className="process-list">
            {t.process.map((p, i) => (
              <div key={i} className="process-item">
                <div className="process-num">0{i+1}</div>
                <div className="process-content">
                  <div className="process-title">{p.title}</div>
                  <div className="process-desc">{p.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </section>

        {/* CTA */}
        <div className="cta-section">

          <div className="cta-btns">
            <button className="fiverr-btn" onClick={handleFiverr}>

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</body>
</html>
